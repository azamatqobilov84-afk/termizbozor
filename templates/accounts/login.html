{% extends 'base.html' %}

{% block title %}Tizimga kirish — {{ site_name }}{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-2xl shadow-xl border border-gray-100 p-8">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-gradient-to-br from-primary-500 to-primary-700 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4">
                    🛒
                </div>
                <h1 class="font-display text-2xl font-bold text-gray-900">Xush kelibsiz!</h1>
                <p class="text-gray-600 mt-1">Hisobingizga kiring</p>
            </div>

            <form method="post" class="space-y-4">
                {% csrf_token %}
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Foydalanuvchi nomi</label>
                    <input type="text" name="username" required
                           class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:border-primary-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Parol</label>
                    <input type="password" name="password" required
                           class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:border-primary-500 focus:outline-none">
                </div>

                <button type="submit" class="w-full px-6 py-3 bg-primary-600 text-white font-bold rounded-xl hover:bg-primary-700 transition shadow-md">
                    Kirish
                </button>
            </form>

            <p class="text-center text-sm text-gray-600 mt-6">
                Hisobingiz yo'qmi?
                <a href="{% url 'accounts:register' %}" class="text-primary-600 font-medium hover:underline">Ro'yxatdan o'ting</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
